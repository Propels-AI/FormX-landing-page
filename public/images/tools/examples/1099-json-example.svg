  <!-- box_1_nonemployee_compensation -->
  <tspan x="44" dy="18">  <tspan fill="#2563EB">"box_1_compensation"</tspan><tspan fill="#5A5E66">: </tspan><tspan fill="#D97706">24500.00</tspan><tspan fill="#5A5E66">,</tspan></tspan>

  <!-- box_4_federal_tax -->
  <tspan x="44" dy="18">  <tspan fill="#2563EB">"box_4_federal_tax"</tspan><tspan fill="#5A5E66">: </tspan><tspan fill="#D97706">0.00</tspan><tspan fill="#5A5E66">,</tspan></tspan>

  <!-- box_5_state_tax -->
  <tspan x="44" dy="18">  <tspan fill="#2563EB">"box_5_state_tax"</tspan><tspan fill="#5A5E66">: </tspan><tspan fill="#D97706">1225.00</tspan><tspan fill="#5A5E66">,</tspan></tspan>


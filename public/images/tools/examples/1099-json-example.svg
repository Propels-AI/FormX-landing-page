  <tspan x="44" dy="18">  <tspan fill="#2563EB">"box_6_state"</tspan><tspan fill="#5A5E66">: </tspan><tspan fill="#16A34A">"CA"</tspan><tspan fill="#5A5E66">,</tspan></tspan>

